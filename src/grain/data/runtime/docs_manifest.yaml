version: 1

project:
  name: "[Your Project Name]"
  type: "[project type — e.g. web_app, cli_tool, service, data_pipeline]"
  mode: single_user
  storage: filesystem
  authority_model: explicit_hierarchy
  minimum_grain_version: "__GRAIN_VERSION__"

# Grain configuration — project-level defaults for the grain CLI.
# All fields are optional. Omit any you do not need.
grain:
  default_supervision: gated        # supervised | gated | autonomous
  default_format: text              # text | json
  upgrade_check: warn               # warn | silent
  embedding_provider: none          # none | ollama | local | openai
  ollama_embedding_model: nomic-embed-text
  local_embedding_model: sentence-transformers/all-MiniLM-L6-v2
  openai_embedding_model: text-embedding-3-small

branch_policy:
  mode: off             # "phase" | "task" | "off" (default off = no branch checking)
  pattern: ""           # optional glob override; empty = use mode default
  enforce: false        # false = warn banner on stderr; true = wrong_branch stop reason
  enforce_after_days: 0 # days grace before enforcement activates (0 = immediate)
  message: ""           # optional custom message shown on violation

upgrade_policy:
  min_version: ""              # set by grain upgrade after successful install
  min_version_set_at: ""       # set by grain upgrade; drives grace period calculation
  enforce: false               # false = warn-only; true = block commands
  enforce_after_days: 0        # days from min_version_set_at before enforcement activates
  message: ""                  # optional custom message shown when blocked or warned

canonical:
  - id: product_scope
    path: docs/canonical/product_scope.md
    purpose: Defines goals, non-goals, users, and scope boundaries
    authority: highest
    editable_by_agents: false
    read_when:
      - starting_project
      - evaluating_scope
      - planning_phases
      - resolving_scope_conflicts

  - id: architecture
    path: docs/canonical/architecture.md
    purpose: Defines system modules, interfaces, and design decisions
    authority: highest
    editable_by_agents: false
    read_when:
      - designing_features
      - creating_tasks
      - validating_implementation
      - resolving_design_conflicts

  - id: decisions
    path: docs/canonical/decisions.md
    purpose: ADR-style log of architecture decisions and their rationale
    authority: highest
    editable_by_agents: false
    read_when:
      - designing_features
      - resolving_design_conflicts
      - creating_tasks

  - id: landscape
    path: docs/canonical/landscape.md
    purpose: Competitive landscape analysis and external references
    authority: highest
    editable_by_agents: false
    read_when:
      - starting_project
      - evaluating_scope
      - planning_phases

working:
  - id: implementation_plan
    path: docs/working/implementation_plan.md
    purpose: Current build sequence and milestone plan
    authority: secondary
    editable_by_agents: true
    read_when:
      - selecting_next_work
      - checking_phase_sequence

  - id: backlog
    path: docs/working/backlog.md
    purpose: Task inventory grouped by phase with status and dependencies
    authority: secondary
    editable_by_agents: true
    read_when:
      - selecting_tasks
      - reviewing_progress
      - planning_next_packet

  - id: current_focus
    path: docs/working/current_focus.md
    purpose: Active focus, temporary constraints, and immediate priorities
    authority: secondary
    editable_by_agents: true
    read_when:
      - starting_any_execution
      - resuming_work

  - id: open_questions
    path: docs/working/open_questions.md
    purpose: Open decisions needing clarification or approval
    authority: informational
    editable_by_agents: true
    read_when:
      - encountering_blockers
      - preparing_review

  - id: change_proposals
    path: docs/working/change_proposals.md
    purpose: Proposed changes to canonical docs pending human approval
    authority: advisory
    editable_by_agents: true
    read_when:
      - canonical_conflict_detected
      - proposing_scope_or_architecture_changes

  - id: workflow_metrics
    path: docs/working/workflow_metrics.md
    purpose: Per-phase execution metrics and workflow health observations
    authority: informational
    editable_by_agents: true
    read_when:
      - closing_phase
      - reviewing_workflow_health

  - id: current_task
    path: docs/working/current_task.md
    purpose: Active task pointer — task ID, packet path, and execution status
    authority: secondary
    editable_by_agents: true
    read_when:
      - session_start
      - workflow_check

  - id: roadmap
    path: docs/working/roadmap.md
    purpose: Directional planning — strong candidates, under consideration, explicitly deferred
    authority: informational
    editable_by_agents: true
    read_when:
      - planning_phases
      - selecting_next_work

  - id: landscape_working
    path: docs/working/landscape.md
    purpose: Working analysis notes on the competitive and technical landscape
    authority: informational
    editable_by_agents: true
    read_when:
      - starting_project
      - evaluating_scope

  - id: proposals
    path: docs/working/proposals/
    purpose: Operator-approved change proposal documents
    authority: advisory
    editable_by_agents: false
    read_when:
      - canonical_conflict_detected
      - proposing_scope_or_architecture_changes

  - id: tooling_notes
    path: docs/working/tooling_notes.md
    purpose: Structured inbox for workflow friction, tool bugs, and mid-session observations (Type/Status/Severity columns)
    authority: informational
    editable_by_agents: true
    read_when:
      - encountering_blockers
      - logging_friction

runtime:
  - id: project_rules
    path: docs/runtime/PROJECT_RULES.md
    purpose: Global execution rules for agents and tools
    authority: highest_runtime
    editable_by_agents: false
    read_when:
      - always

  - id: docs_index
    path: docs/runtime/docs_index.md
    purpose: Human-readable doc map, hierarchy, and permissions
    authority: high_runtime
    editable_by_agents: true
    read_when:
      - entering_repo
      - locating_authority

  - id: docs_manifest
    path: docs/runtime/docs_manifest.yaml
    purpose: Machine-readable doc registry and load rules
    authority: high_runtime
    editable_by_agents: true
    read_when:
      - context_selection
      - validation
      - packet_generation

  - id: context_loading
    path: docs/runtime/context_loading.md
    purpose: Rules for selecting minimal relevant context
    authority: high_runtime
    editable_by_agents: true
    read_when:
      - before_task_execution
      - during_packet_generation

  - id: agent_profiles
    path: docs/runtime/agent_profiles.md
    purpose: Model classes, routing logic, and escalation rules
    authority: high_runtime
    editable_by_agents: true
    read_when:
      - selecting_model
      - escalating_work

  - id: adapter_profiles
    path: docs/runtime/adapter_profiles.md
    purpose: Adapter contract and domain-specific execution/context/review hints
    authority: high_runtime
    editable_by_agents: true
    read_when:
      - designing_adapters
      - context_selection

tasks:
  root: tasks/
  packet_files:
    - name: task
      filename: task.md
      required: true
    - name: context
      filename: context.md
      required: true
    - name: plan
      filename: plan.md
      required: true
    - name: deliverable_spec
      filename: deliverable_spec.md
      required: true
    - name: results
      filename: results.md
      required: false
    - name: handoff
      filename: handoff.md
      required: false
  patch_dir: patches/
  status_values:
    - draft
    - ready
    - in_progress
    - blocked
    - review
    - needs_fix
    - done
  id_format: "P<N>-T<NN>-TASK-####"

rules:
  authority_order:
    - docs/runtime/PROJECT_RULES.md
    - docs/canonical/*
    - docs/runtime/docs_manifest.yaml
    - docs/runtime/docs_index.md
    - docs/working/*
    - tasks/*
  canonical_change_policy:
    direct_agent_edits_allowed: false
    require_human_approval: true
    proposal_location: docs/working/change_proposals.md
  context_policy:
    load_minimum_required_docs: true
    prefer_task_packet_context: true
    avoid_full_repo_context: true
  execution_policy:
    use_task_packets: true
    one_task_one_packet: true
    patch_over_rewrite: true
    preserve_doc_separation: true
  completion_policy:
    require_defined_deliverable: true
    require_results_recorded: true
    require_rule_check: true
    require_user_approval: true
    require_verification_pass: false
    allow_close_when_verification_not_run: true
